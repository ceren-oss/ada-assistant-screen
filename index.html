<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ada — Miniskop Satış Asistanı</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
:root{
  /* Ada teması — kozmik lacivert + neon */
  --bg:#0a0718; --bg-2:#0e0920; --panel:#150e2e; --panel-2:#1b1338;
  --ink:#eef0ff; --ink-soft:#a5a3c8; --ink-dim:#736f9e;
  --line:#2a2050; --line-soft:#1f1740;
  --paper:#0a0718; --white:#150e2e;
  --brand:#5b8cff; --brand-deep:#3d6bff; --brand-soft:#1a1f4a;
  --cyan:#22d3ee; --cyan-soft:#0d2b38;
  --magenta:#c855ff; --magenta-soft:#2a1240;
  --lime:#34d399; --lime-soft:#0d2e26;
  --amber:#fbbf24; --amber-soft:#332512;
  --coral:#fb7185; --coral-soft:#331520;
  --violet:#a855f7; --violet-soft:#241145;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 12px 40px rgba(10,7,24,.6);
  --glow:0 0 24px rgba(91,140,255,.35);
  --radius:14px;
  --mono:'SF Mono',ui-monospace,'Cascadia Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.5;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(91,140,255,.10), transparent),
    radial-gradient(ellipse 60% 50% at 90% 10%, rgba(200,85,255,.08), transparent);
  background-attachment:fixed;
}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}

/* ===== Shell ===== */
.shell{display:flex;min-height:100vh}
.side{
  width:230px;background:rgba(21,14,46,.7);backdrop-filter:blur(12px);border-right:1px solid var(--line);
  padding:20px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;flex-shrink:0;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px}
.brand-mark{
  width:38px;height:38px;border-radius:11px;flex-shrink:0;overflow:hidden;
  background:linear-gradient(135deg,var(--brand),var(--magenta));
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px;
  box-shadow:0 4px 18px rgba(91,140,255,.5);
}
.brand-mark img{width:100%;height:100%;object-fit:cover}
.brand-name{font-weight:800;font-size:17px;letter-spacing:-.02em}
.brand-sub{font-size:11px;color:var(--ink-soft);font-weight:500}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:10px;
  border:none;background:none;color:var(--ink-soft);font-size:13.5px;font-weight:600;
  text-align:left;width:100%;transition:.13s;
}
.nav-item:hover{background:var(--line-soft);color:var(--ink)}
.nav-item.on{background:linear-gradient(90deg,var(--brand-soft),transparent);color:var(--brand);box-shadow:inset 2px 0 0 var(--brand)}
.nav-ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.side-foot{margin-top:auto;padding:12px 10px 0;border-top:1px solid var(--line-soft)}
.who{font-size:12px;color:var(--ink-soft)}
.who b{color:var(--ink);display:block;font-size:13px}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  height:60px;background:rgba(14,9,32,.75);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:20;
}
.page-title{font-size:16px;font-weight:800;letter-spacing:-.01em}
.page-title span{color:var(--ink-soft);font-weight:500}
.pill{
  font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
  background:var(--lime-soft);color:var(--lime);display:inline-flex;align-items:center;gap:5px;
}
.pill .dot{width:6px;height:6px;border-radius:50%;background:var(--lime)}
.pill.off{background:var(--coral-soft);color:var(--coral)}
.pill.off .dot{background:var(--coral)}
.top-actions{display:flex;gap:10px;align-items:center}
.gmail-btn{
  border:1px solid var(--line);background:var(--bg-2);color:var(--ink);
  border-radius:10px;padding:7px 12px;font-size:12.5px;font-weight:700;transition:.15s
}
.gmail-btn:hover{background:var(--line-soft)}
.gmail-btn.on{border-color:var(--lime);color:var(--lime);background:var(--lime-soft)}
.mail-modal{
  position:fixed;inset:0;background:rgba(7,5,16,.72);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:1200;padding:16px
}
.mail-modal.on{display:flex}
.mail-card{width:min(760px,100%);max-height:88vh;overflow:auto}
.mail-err{color:var(--coral);font-size:12.5px;font-weight:700;margin-top:8px}
.mail-ok{color:var(--lime);font-size:12.5px;font-weight:700;margin-top:8px}
.content{padding:26px;max-width:1080px;width:100%;margin:0 auto;flex:1}

/* ===== Common ===== */
.card{background:linear-gradient(160deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:22px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.sec-head{margin-bottom:16px}
.sec-head h2{font-size:19px;font-weight:800;letter-spacing:-.02em}
.sec-head p{font-size:13.5px;color:var(--ink-soft);margin-top:3px}
label.fl{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em}
.inp,.ta,.sel{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
  font-size:14px;color:var(--ink);background:var(--bg-2);transition:.15s;
}
.inp::placeholder,.ta::placeholder{color:var(--ink-dim)}
.inp:focus,.ta:focus,.sel:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.sel option{background:var(--panel);color:var(--ink)}
.ta{resize:vertical;min-height:90px;line-height:1.55}
.fld{margin-bottom:14px}
.row{display:flex;gap:12px}
.row>*{flex:1}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 18px;border-radius:10px;border:1px solid transparent;
  font-size:14px;font-weight:700;transition:.15s;
  background:linear-gradient(135deg,var(--brand),var(--magenta));color:#fff;
  box-shadow:0 4px 16px rgba(91,140,255,.3);
}
.btn:hover{filter:brightness(1.1);box-shadow:0 6px 22px rgba(91,140,255,.45)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.ghost{background:var(--bg-2);border-color:var(--line);color:var(--ink);box-shadow:none}
.btn.ghost:hover{background:var(--line-soft);filter:none}
.btn.lime{background:linear-gradient(135deg,var(--lime),var(--cyan))}.btn.lime:hover{filter:brightness(1.1)}
.btn.sm{padding:7px 13px;font-size:13px}
.btn.wide{width:100%}
.hint{font-size:12.5px;color:var(--ink-soft);margin-top:6px}
.tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tab{
  border:1px solid var(--line);background:var(--panel);color:var(--ink-soft);
  padding:9px 14px;border-radius:10px;font-size:13px;font-weight:700;transition:.14s;
}
.tab:hover{background:var(--panel-2);color:var(--ink)}
.tab.on{
  background:linear-gradient(90deg,var(--brand-soft),transparent);
  color:var(--brand);border-color:var(--brand);box-shadow:inset 2px 0 0 var(--brand);
}

/* ===== Dashboard ===== */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.stat{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.stat .k{font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em}
.stat .v{font-size:30px;font-weight:800;letter-spacing:-.03em;margin-top:6px}
.stat .v small{font-size:14px;color:var(--ink-soft);font-weight:600}
.stat .t{font-size:12px;margin-top:4px;font-weight:600}
.up{color:var(--lime)}.down{color:var(--coral)}
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.quick{
  background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;text-align:left;box-shadow:var(--shadow);transition:.15s;display:flex;flex-direction:column;gap:10px;
}
.quick:hover{transform:translateY(-2px);border-color:var(--brand);box-shadow:0 8px 26px rgba(31,95,219,.14)}
.quick .qi{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px}
.quick h3{font-size:15px;font-weight:800}
.quick p{font-size:12.5px;color:var(--ink-soft)}

/* ===== Chat / AI ===== */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 60px - 52px)}
.chat-log{flex:1;overflow-y:auto;padding:6px 2px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:11px;max-width:82%}
.msg.me{align-self:flex-end;flex-direction:row-reverse}
.av{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;font-size:15px;font-weight:800;color:#fff;overflow:hidden}
.av.ai{background:linear-gradient(135deg,var(--brand),var(--magenta))}
.av.me{background:linear-gradient(135deg,var(--violet),var(--brand))}
.bub{padding:12px 15px;border-radius:14px;font-size:14px;line-height:1.6}
.msg.ai .bub{background:var(--panel-2);border:1px solid var(--line);border-top-left-radius:4px}
.msg.me .bub{background:linear-gradient(135deg,var(--brand),var(--magenta));color:#fff;border-top-right-radius:4px}
.bub h4{font-size:14px;margin:8px 0 4px;font-weight:800}
.bub ul{margin:6px 0 6px 18px}
.bub p{margin:6px 0}
.bub code{font-family:var(--mono);font-size:12.5px;background:var(--line-soft);padding:1px 5px;border-radius:5px}
.chat-input{display:flex;gap:10px;padding:14px 0 0;border-top:1px solid var(--line-soft);margin-top:8px}
.chat-input .ta{min-height:48px;max-height:130px}
.suggs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}


.upload-zone{border:2px dashed var(--line);border-radius:12px;padding:26px;text-align:center;color:var(--ink-soft);transition:.15s}
.upload-zone:hover{border-color:var(--brand);background:var(--brand-soft)}
.file-chip{display:inline-flex;align-items:center;gap:8px;background:var(--brand-soft);color:var(--brand-deep);padding:6px 12px;border-radius:8px;font-size:12.5px;font-weight:600;margin:4px 4px 0 0}
.file-chip button{border:none;background:none;color:var(--brand-deep);font-weight:800;font-size:15px;line-height:1}

.hide{display:none!important}

/* ===== Açılış splash ekranı ===== */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(160deg,#2a1a5e 0%,#1a1440 45%,#0e0920 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background-image:
    radial-gradient(ellipse 60% 45% at 50% 22%, rgba(120,170,255,.45), transparent 70%),
    radial-gradient(ellipse 55% 45% at 22% 70%, rgba(200,110,255,.32), transparent 70%),
    radial-gradient(ellipse 55% 45% at 80% 78%, rgba(80,220,255,.28), transparent 70%),
    radial-gradient(ellipse 90% 70% at 50% 50%, rgba(60,40,130,.35), transparent 75%);
  overflow:hidden;
  transition:opacity .8s ease, visibility .8s ease;
}
#splash::before{
  content:"";position:absolute;inset:-20%;z-index:0;pointer-events:none;
  background:
    radial-gradient(circle at 30% 25%, rgba(150,190,255,.35), transparent 22%),
    radial-gradient(circle at 72% 68%, rgba(210,130,255,.3), transparent 24%),
    radial-gradient(circle at 55% 45%, rgba(90,230,255,.22), transparent 30%);
  filter:blur(30px);
  animation:auroraFloat 12s ease-in-out infinite;
}
@keyframes auroraFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  50%{transform:translate(3%,-2%) scale(1.08)}
}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none}
.splash-stage{position:relative;margin-bottom:30px;animation:splashIn 1s cubic-bezier(.2,.9,.3,1.2)}
.splash-av{
  width:240px;height:240px;border-radius:50%;position:relative;overflow:hidden;
  background:radial-gradient(circle at 40% 30%,#2a1b5c,#0e0920 70%);
  box-shadow:0 0 80px rgba(91,140,255,.55),0 0 160px rgba(200,85,255,.35);
  border:2px solid rgba(91,140,255,.45);animation:float 5s ease-in-out infinite;
}
.splash-av video,.splash-av img{width:100%;height:100%;object-fit:cover}
.splash-ring{position:absolute;inset:-22px;border-radius:50%;border:1.5px dashed rgba(200,85,255,.4);animation:spin 20s linear infinite}
.splash-ring::before{content:"";position:absolute;inset:-14px;border-radius:50%;border:1px solid rgba(34,211,238,.22);animation:spin 28s linear infinite reverse}
.splash-name{
  font-size:52px;font-weight:800;letter-spacing:-.03em;color:#fff;
  text-shadow:0 0 24px rgba(180,210,255,.45);
  animation:splashUp 1s ease .3s both;
}
.splash-tag{
  font-size:16px;color:#fff;font-weight:600;margin-top:10px;max-width:440px;line-height:1.5;
  text-shadow:0 1px 12px rgba(0,0,0,.5);
  animation:splashUp 1s ease .5s both;
}
.splash-tag b{color:#fff;font-weight:700}
.splash-dots{display:flex;gap:7px;margin-top:34px;animation:splashUp 1s ease .7s both}
.splash-dots i{width:9px;height:9px;border-radius:50%;background:var(--brand);animation:bounce 1.3s infinite;box-shadow:0 0 10px rgba(91,140,255,.6)}
.splash-dots i:nth-child(2){animation-delay:.18s;background:var(--violet)}
.splash-dots i:nth-child(3){animation-delay:.36s;background:var(--magenta)}
@keyframes splashIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes splashUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.splash-skip{position:absolute;bottom:26px;font-size:12.5px;color:var(--ink-dim);background:none;border:none;letter-spacing:.02em}
.splash-skip:hover{color:var(--ink-soft)}
/* Öne çıkan ışıklı Miniskop logosu */
.splash-brand{
  position:absolute;top:16%;left:50%;transform:translate(-50%,-50%);
  width:clamp(240px,42vw,440px);height:auto;pointer-events:none;user-select:none;z-index:2;
  opacity:1;
  filter:drop-shadow(0 0 22px rgba(255,255,255,.7)) drop-shadow(0 0 55px rgba(180,210,255,.5)) drop-shadow(0 0 110px rgba(140,110,255,.4));
  animation:brandGlow 4.2s ease-in-out infinite;
}
@keyframes brandGlow{
  0%,100%{filter:drop-shadow(0 0 20px rgba(255,255,255,.55)) drop-shadow(0 0 50px rgba(180,210,255,.4)) drop-shadow(0 0 100px rgba(140,110,255,.3))}
  50%{filter:drop-shadow(0 0 34px rgba(255,255,255,.9)) drop-shadow(0 0 80px rgba(180,210,255,.7)) drop-shadow(0 0 150px rgba(140,110,255,.55))}
}
#splash .splash-stage,#splash .splash-name,#splash .splash-tag,#splash .splash-dots,#splash .splash-skip{position:relative;z-index:3}


/* ===== Ada hero (ana ekran) ===== */
.hero{min-height:calc(100vh - 60px - 52px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px 0 40px;position:relative}
.genius-stage{position:relative;margin-bottom:24px}
.genius-av{
  width:200px;height:200px;border-radius:50%;position:relative;
  background:radial-gradient(circle at 40% 30%,#2a1b5c,#0e0920 70%);
  display:grid;place-items:center;font-size:88px;
  box-shadow:0 0 60px rgba(91,140,255,.5),0 0 120px rgba(200,85,255,.3),inset 0 0 30px rgba(0,0,0,.5);
  animation:float 5s ease-in-out infinite;overflow:hidden;border:2px solid rgba(91,140,255,.4);
}
.genius-av img,.genius-av video{width:100%;height:100%;object-fit:cover}
.genius-av::after{content:"";position:absolute;inset:0;border-radius:50%;box-shadow:inset 0 0 40px rgba(91,140,255,.25);pointer-events:none}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.genius-ring{
  position:absolute;inset:-18px;border-radius:50%;border:1.5px dashed rgba(200,85,255,.4);
  animation:spin 22s linear infinite;
}
.genius-ring::before{content:"";position:absolute;inset:-12px;border-radius:50%;border:1px solid rgba(34,211,238,.2);animation:spin 30s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.genius-pulse{
  position:absolute;bottom:14px;right:14px;width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--lime));border:3px solid var(--bg);display:grid;place-items:center;
  font-size:13px;color:var(--bg);box-shadow:0 0 16px rgba(34,211,238,.7);animation:pop 2.4s ease-in-out infinite;z-index:2;
}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.hero-greet{font-size:15px;color:var(--cyan);font-weight:700;letter-spacing:.02em;margin-bottom:4px;text-shadow:0 0 12px rgba(34,211,238,.4)}
.hero-title{font-size:32px;font-weight:800;letter-spacing:-.03em;max-width:600px;line-height:1.2}
.hero-title b{background:linear-gradient(90deg,var(--cyan),var(--magenta));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero-bubble{
  margin-top:14px;background:rgba(27,19,56,.7);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:16px;
  padding:12px 20px;font-size:14.5px;color:var(--ink-soft);max-width:520px;box-shadow:var(--shadow);
  position:relative;font-weight:500;min-height:22px;
}
.hero-bubble::before{content:"";position:absolute;top:-8px;left:50%;transform:translateX(-50%) rotate(45deg);width:14px;height:14px;background:rgba(27,19,56,.9);border-left:1px solid var(--line);border-top:1px solid var(--line)}
.hero-opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:30px;max-width:760px;width:100%}
.hero-opt{
  background:linear-gradient(160deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:16px;padding:22px 18px;
  text-align:left;box-shadow:var(--shadow);transition:.16s;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden;
}
.hero-opt::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(91,140,255,.08),transparent);opacity:0;transition:.16s}
.hero-opt:hover{transform:translateY(-3px);border-color:var(--brand);box-shadow:0 10px 34px rgba(91,140,255,.28)}
.hero-opt:hover::before{opacity:1}
.hero-opt .hi{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:22px;position:relative;z-index:1}
.hero-opt h3{font-size:15.5px;font-weight:800;position:relative;z-index:1}
.hero-opt p{font-size:12.5px;color:var(--ink-soft);line-height:1.5;position:relative;z-index:1}
.hero-stats{display:flex;gap:26px;margin-top:34px;flex-wrap:wrap;justify-content:center}
.hero-stat{text-align:center}
.hero-stat .n{font-size:24px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.hero-stat .l{font-size:11.5px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;letter-spacing:.03em}

/* Ada toast (şakacı tepkiler) */
.g-toast-wrap{position:fixed;bottom:24px;right:24px;z-index:100;display:flex;flex-direction:column;gap:10px;max-width:340px}
.g-toast{
  background:linear-gradient(135deg,var(--brand),var(--magenta));color:#fff;border-radius:14px;padding:14px 16px 14px 14px;
  box-shadow:0 10px 34px rgba(91,140,255,.5),0 0 0 1px rgba(200,85,255,.3);display:flex;gap:11px;align-items:flex-start;
  animation:slideIn .35s cubic-bezier(.2,.9,.3,1.4);
}
.g-toast .gi{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:18px;flex-shrink:0;overflow:hidden}
.g-toast .gt{font-size:13.5px;line-height:1.5;font-weight:600}
.g-toast .gt small{display:block;font-weight:400;opacity:.9;font-size:12px;margin-top:2px}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.g-toast.out{animation:slideOut .3s forwards}
@keyframes slideOut{to{transform:translateX(30px);opacity:0}}

@media(max-width:860px){
  .side{width:64px;padding:16px 8px}
  .brand-name,.brand-sub,.nav-item span,.who{display:none}
  .nav-item{justify-content:center}
  .grid2,.grid3,.stat-row,.quick-grid{grid-template-columns:1fr}
  .stat-row{grid-template-columns:1fr 1fr}
}
</style>

  return { araToplam, kdv, genelToplam: araToplam + kdv };
}

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

let _toastT=null;
function geniusToast(msg, sub){
  let wrap=document.getElementById('gToastWrap');
  if(!wrap){ wrap=document.createElement('div'); wrap.id='gToastWrap'; wrap.className='g-toast-wrap'; document.body.appendChild(wrap); }
  const t=document.createElement('div'); t.className='g-toast';
  t.innerHTML=`<div class="gi"><img src="${adaSrc()}" style="width:100%;height:100%;border-radius:10px;object-fit:cover"></div>
    <div class="gt">${escapeHtml(msg)}${sub?`<small>${escapeHtml(sub)}</small>`:''}</div>`;
  wrap.appendChild(t);
  setTimeout(()=>{ t.classList.add('out'); setTimeout(()=>t.remove(),300); }, 5200);
}
function toast(msg, sub){ geniusToast(msg, sub); }

// Olay bildir → tepki üret
function geniusReact(kind, extra){
  if(kind==='teklif'){
    SESH.teklif++;
    if(SESH.teklif>=2) geniusToast(pick(QUIPS.teklifSeri));
    else geniusToast(pick(QUIPS.teklif));
  }
  else if(kind==='sozlesme'){
    SESH.sozlesme++;
    if(extra?.tutar){ SESH.sozlesmeToplam += extra.tutar; }
    const toplam = SESH.sozlesmeToplam;
    geniusToast(pick(QUIPS.sozlesme), toplam? `Bu oturumda toplam sözleşme: ${TL(toplam)} — hedefe adım adım! 🎯`:null);
  }
  else if(kind==='rapor'){ SESH.rapor++; geniusToast(pick(QUIPS.rapor)); }
  else if(kind==='onsiparis'){ SESH.onsiparis++; geniusToast(pick(QUIPS.onsiparis)); }
}

/* ============================================================
   AI çağrısı — Claude API (artifact içi)
   ============================================================ */
async function askClaude(system, userMsg){
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        system:system,
        messages:[{role:"user",content:userMsg}]
      })
    });
    const data = await res.json();
    return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
  }catch(e){
    console.error(e);
    return "⚠️ Ada'ya şu an ulaşılamadı. İnternet bağlantısını kontrol et, tekrar dene.";
  }
}

/* ============================================================
   Gmail compose + Calendar linkleri
   ============================================================ */
function gmailCompose(to, subject, body){
  const u = new URL('https://mail.google.com/mail/');
  u.searchParams.set('view','cm'); u.searchParams.set('fs','1');
  if(to) u.searchParams.set('to',to);
  if(subject) u.searchParams.set('su',subject);
  if(body) u.searchParams.set('body',body);
  return u.toString();
}
function calLink(title, details, dateStr, hours){
  // dateStr: yyyy-mm-dd, hours: [startHour,endHour]
  const d = dateStr ? dateStr.replace(/-/g,'') : '';
  let dates='';
  if(d){
    const s = String(hours?.[0]??10).padStart(2,'0');
    const e = String(hours?.[1]??11).padStart(2,'0');
    dates = `${d}T${s}0000/${d}T${e}0000`;
  }
  const u = new URL('https://calendar.google.com/calendar/render');
  u.searchParams.set('action','TEMPLATE');
  u.searchParams.set('text',title||'Görüşme');
  if(details) u.searchParams.set('details',details);
  if(dates) u.searchParams.set('dates',dates);
  return u.toString();
}

function initGmailClient(){
  if(!(window.google && google.accounts && google.accounts.oauth2)) return false;
  if(!GMAIL_CLIENT_ID || GMAIL_CLIENT_ID.includes('[BURAYA CLIENT ID YAPIŞTIR]')) return false;
  if(gmailTokenClient) return true;
  gmailTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GMAIL_CLIENT_ID,
    scope: GMAIL_SCOPE,
    callback: ()=>{}
  });
  return true;
}
async function fetchGmailProfile(){
  if(!gmailAccessToken) return null;
  const r = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/profile',{
    headers:{Authorization:`Bearer ${gmailAccessToken}`}
  });
  if(!r.ok) throw new Error('Gmail profil alınamadı');
  const d = await r.json();
  gmailUserEmail = d.emailAddress || '';
  renderGmailButton();
  return d;
}
async function requestGmailToken(prompt='consent'){
  if(!initGmailClient()) throw new Error('Google istemcisi hazır değil. Client ID kontrol et.');
  return await new Promise((resolve,reject)=>{
    gmailTokenClient.callback = async (resp)=>{
      if(resp.error){ reject(new Error(resp.error)); return; }
      gmailAccessToken = resp.access_token || '';
      gmailTokenExpiresAt = Date.now() + ((+resp.expires_in || 3500) * 1000);
      renderGmailButton();
      resolve(true);
    };
    gmailTokenClient.requestAccessToken({prompt});
  });
}
async function ensureGmailToken(interactive=false){
  const marginMs = 30 * 1000;
  if(gmailAccessToken && Date.now() < (gmailTokenExpiresAt - marginMs)) return true;
  await requestGmailToken(interactive ? 'consent' : '');
  return !!gmailAccessToken;
}
async function connectGoogle(){
  try{
    await requestGmailToken('consent');
    toast('Google bağlandı');
  }catch(e){
    toast('Google bağlantı hatası');
    console.error('Google bağlantı hatası:', e);
  }
}

async function teklifGecmisiKontrol(){
  const el = document.getElementById('tGecmis');
  const kurum = (document.getElementById('tKurum')?.value||'').trim();
  if(!el) return;
  if(!kurum || !sb){ el.textContent=''; return; }
  const { data, error } = await sb.from('teklif_gecmisi')
    .select('urun,birim_fiyat,teklif_tarihi,miktar,toplam')
    .ilike('kurum', `%${kurum}%`)
    .order('teklif_tarihi',{ascending:false})
    .limit(5);
  if(error || !data?.length){ el.textContent=''; return; }
  const son = data[0];
  const urunler = [...new Set(data.map(x=>x.urun).filter(Boolean))].slice(0,3);
  el.innerHTML = `⚠️ Bu kurum için geçmiş teklif bulundu (${data.length} kayıt). Son teklif: ${escapeHtml(son.teklif_tarihi||'-')} · ${escapeHtml(son.urun||'-')} · ${TL(son.birim_fiyat||0)}.`
    + (urunler.length?`<br><span style="color:var(--ink-dim)">Geçmiş ürünler: ${escapeHtml(urunler.join(', '))}</span>`:'');
}
async function teklifGecmisiKaydet(d){
  if(!sb || !d.satirlar?.length) return;
  const toIso = trDate => {
    const [dd,mm,yy] = String(trDate||'').split('.');
    if(!dd || !mm || !yy) return new Date().toISOString().slice(0,10);
    return `${yy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
  };
  const tarihIso = toIso(d.bugun);
  const rows = d.satirlar.map(s=>({
    kurum:d.kurum,
    yetkili:d.yetkili||null,
    urun:s.ad,
    miktar:Number(s.adet||0),
    birim_fiyat:Number(s.birim||0),
    toplam:Number(s.toplam||0),
    teklif_tarihi:tarihIso,
    kaynak:'ada',
    kaynak_dosya:`${d.kurum}_${tarihIso}_teklif.pdf`
  }));
  const { error } = await sb.from('teklif_gecmisi').insert(rows);
  if(error) console.warn('teklif_gecmisi kayıt hatası:', error.message);
}
async function robotoB64(){
  if(!robotoB64Promise){
    robotoB64Promise = fetch('https://cdn.jsdelivr.net/gh/google/fonts@main/apache/roboto/Roboto-Regular.ttf')
      .then(r=>r.arrayBuffer())
      .then(buf=>{
        let bin=''; const bytes=new Uint8Array(buf); const chunk=0x8000;
        for(let i=0;i<bytes.length;i+=chunk) bin += String.fromCharCode(...bytes.subarray(i,i+chunk));
        return btoa(bin);
      });
  }
  return robotoB64Promise;
}
async function downloadTeklifPdf(d){
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:'pt',format:'a4'});
    const roboto = await robotoB64();
    doc.addFileToVFS('Roboto-Regular.ttf', roboto);
    doc.addFont('Roboto-Regular.ttf','Roboto','normal');
    doc.setFont('Roboto','normal');
    let y=52;
    doc.setFontSize(16); doc.text('FİYAT TEKLİFİ', 297.5, y,{align:'center'}); y+=24;
    doc.setFontSize(10.5);
    doc.text(`Sayın: ${d.kurum}${d.yetkili ? ' / '+d.yetkili : ''}`,42,y); y+=14;
    doc.text(d.adres || '-',42,y); y+=14;
    doc.text(`Teklif Tarihi: ${d.bugun}`,42,y); y+=18;
    const cols=[42,114,308,370,456,546];
    doc.setFillColor(238,241,247); doc.rect(cols[0],y,cols[5]-cols[0],22,'F');
    doc.setDrawColor(135,145,160); doc.rect(cols[0],y,cols[5]-cols[0],22);
    doc.setFontSize(9);
    doc.text('Hizmet Kapsamı',cols[0]+4,y+14); doc.text('Miktar',cols[1]+4,y+14);
    doc.text('Birim Fiyat',cols[2]+4,y+14); doc.text('KDV Dahil Birim',cols[3]+4,y+14); doc.text('Toplam',cols[4]+4,y+14);
    y+=22;
    doc.setFontSize(9.5);
    for(const s of d.satirlar){
      doc.rect(cols[0],y,cols[5]-cols[0],20);
      for(let i=1;i<cols.length-1;i++) doc.line(cols[i],y,cols[i],y+20);
      doc.text(String(s.ad||'-'),cols[0]+4,y+13,{maxWidth:cols[1]-cols[0]-8});
      doc.text(String(s.adet||0),cols[1]+4,y+13);
      doc.text(TL(s.birim),cols[2]+4,y+13);
      doc.text(TL(s.kdvDahilBirim),cols[3]+4,y+13);
      doc.text(TL(s.toplam),cols[4]+4,y+13);
      y+=20;
    }
    y+=14; doc.setFontSize(10.5); doc.text(`GENEL TOPLAM (KDV Dahil): ${TL(d.genelToplam)}`,42,y); y+=16;
    doc.setFontSize(9.3);
    for(const m of TEKLIF_MADDELERI){
      const lines = doc.splitTextToSize(`• ${m}`, 510);
      doc.text(lines,42,y); y += (lines.length*12)+1;
    }
    if(d.not){ const lines = doc.splitTextToSize(`• ${d.not}`,510); doc.text(lines,42,y); y += (lines.length*12)+1; }
    doc.setFontSize(8.2);
    doc.text(MINISKOP.unvan,297.5,778,{align:'center'});
    doc.text(`Tel: ${MINISKOP.tel} · E-Mail: ${MINISKOP.mail}`,297.5,790,{align:'center'});
    doc.text(`${MINISKOP.adresKisa} · ${MINISKOP.vd}`,297.5,802,{align:'center'});
    const dosya = `${String(d.kurum||'teklif').replace(/[\/\\:*?"<>|]/g,'').trim()||'teklif'}_${new Date().getFullYear()}_Fiyat_Teklifi.pdf`;
    doc.save(dosya);
  }catch(e){
    console.error(e);
    printHtmlDoc('Fiyat Teklifi', buildTeklifHtml(d));
  }
}

function debouncedSozGecmis(){

async function sozGecmisKontrol(){
  const el=document.getElementById('snGecmis'); const kurum=(document.getElementById('snKurum')?.value||'').trim();

  if(!kurum || !sb){ el.textContent=''; return; }
  const {data,error}=await sb.from('sozlesme_gecmisi').select('*').ilike('kurum',`%${kurum}%`).order('created_at',{ascending:false}).limit(1);
  if(error || !data?.length){ el.textContent=''; return; }
  const s=data[0];
  const pay = await sb.from('sozlesme_odeme').select('odeme_kosulu').ilike('kurum',`%${kurum}%`).eq('donem',s.donem).order('created_at',{ascending:false}).limit(1);
  const kosul = pay.data?.[0]?.odeme_kosulu || '-';
  el.textContent = `📋 Geçen dönem: ${s.donem||'-'}, ${s.kademe||'-'}, ${kosul}`;
}
function ayToMonthNo(ay){
  const map={Eylül:9,Ekim:10,Kasım:11,Aralık:12,Ocak:1,Şubat:2,Mart:3,Nisan:4,Mayıs:5,Haziran:6};
  return map[ay]||9;
}
function vadeDateFromDonem(donem, ay){
  const [y1,y2] = String(donem||'').split('-').map(x=>parseInt(x,10));
  const m = ayToMonthNo(ay);
  const y = (m>=9 ? y1 : y2) || new Date().getFullYear();
  const mm = String(m).padStart(2,'0');
  return `${y}-${mm}-15`;
}

async function sozlesmeOlustur(){
  const msgEl = document.getElementById('snMsg');
  const outEl = document.getElementById('snOut');
  if(!sb){ msgEl.textContent='Supabase bağlantısı yok: '+(SB_INIT_ERROR||''); msgEl.style.color='var(--coral)'; return; }
  const d = {
    kurum: val('snKurum').trim(),
    karsi_taraf: val('snYetkili').trim() || null,
    adres: val('snAdres').trim() || null,
    donem: val('snDonem').trim() || '2026-2027',
    sure_baslangic: val('snBaslangic').trim() || 'Eylül',
    sure_bitis: val('snBitis').trim() || 'Haziran',
    kademe: getCheckedValues('snKademe').join('+') || null,
    kapsam: getCheckedValues('snKapsam').join('+') || null,
    pesinat_tutar: Number(val('snPesinat')||0),
    pesinat_tarihi: val('snPesinatTarih') || null,
    kalan_tutar: Number(val('snKalan')||0),
    taksit_sayisi: Math.max(1, Number(val('snTaksit')||1)),
    vade_aylari: getCheckedValues('snVade'),
    odeme_tipi: val('snOdemeTipi')
  };
  if(!d.kurum){ msgEl.textContent='Kurum zorunlu.'; return; }
  const preview = buildSozlesmePreviewHtml(d);
  outEl.classList.remove('empty'); outEl.innerHTML = preview;
  const kaynak_dosya = await downloadSozlesmePdf(d);
  const odeme_kosulu = `%${Math.round((d.pesinat_tutar/Math.max(1,d.pesinat_tutar+d.kalan_tutar))*100)} peşinat + ${d.vade_aylari.join('/')} ${d.odeme_tipi}`;
  const sgPayload = {
    kurum:d.kurum, donem:d.donem, sure_baslangic:d.sure_baslangic, sure_bitis:d.sure_bitis,
    kademe:d.kademe, kapsam:d.kapsam, karsi_taraf:d.karsi_taraf, kaynak_dosya, format:'pdf'
  };
  const soPayload = {
    kurum:d.kurum, donem:d.donem, odeme_kosulu, pesinat_tutar:d.pesinat_tutar,
    kalan_tutar:d.kalan_tutar, taksit_sayisi:d.taksit_sayisi, cek:d.odeme_tipi==='cek'
  };
  const { error:esg } = await sb.from('sozlesme_gecmisi').insert([sgPayload]);
  if(esg){ msgEl.textContent='Sözleşme geçmişi kaydı hatası: '+esg.message; return; }
  const { error:eso } = await sb.from('sozlesme_odeme').insert([soPayload]);
  if(eso){ msgEl.textContent='Ödeme kaydı hatası: '+eso.message; return; }
  const taksitTutari = d.kalan_tutar / d.taksit_sayisi;
  const vadeRows = d.vade_aylari.map(ay=>({
    kurum:d.kurum,
    vade_tarihi:vadeDateFromDonem(d.donem,ay),
    baslik:`💰 ${d.kurum} — ${ay} ${d.odeme_tipi==='cek'?'Çek':'Havale'} vadesi`,
    tur:d.odeme_tipi==='cek'?'Çek vadesi':'Ödeme',

function toBase64(bytes){
  let s=''; for(let i=0;i<bytes.length;i++) s += String.fromCharCode(bytes[i]);
  return btoa(s);
}
function encodeSubjectUtf8(subject){
  const b64 = toBase64(new TextEncoder().encode(subject||''));
  return `=?UTF-8?B?${b64}?=`;
}
function buildRawMail({to,subject,body}){
  return `From: me\r\nTo: ${to}\r\nSubject: ${encodeSubjectUtf8(subject)}\r\nMIME-Version: 1.0\r\nContent-Type: text/plain; charset=UTF-8\r\nContent-Transfer-Encoding: 8bit\r\n\r\n${body}`;
}
function toBase64UrlUtf8(text){
  return toBase64(new TextEncoder().encode(text)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
async function markLeadContacted(lead){
  if(!lead) return;
  lead.status = 'contacted';
  if(sb && lead.id){
    const { error } = await sb.from('leads').update({status:'contacted'}).eq('id', lead.id);
    if(error) console.error('Lead durum güncelleme hatası:', error);
  }
}
async function sendLeadMail(){
  const errEl = document.getElementById('mailErr');
  const okEl = document.getElementById('mailOk');
  const btn = document.getElementById('mailSendBtn');
  const idx = +document.getElementById('mailLeadIdx').value;
  const lead = CURRENT_LEADS[idx];
  const to = (val('mailTo')||'').trim();
  const subject = (val('mailSubject')||'').trim();
  const body = val('mailBody') || '';
  if(errEl) errEl.textContent='';
  if(okEl) okEl.textContent='';
  if(!to || !subject || !body.trim()){ if(errEl) errEl.textContent='Kime, konu ve içerik alanları zorunludur.'; return; }
  try{
    if(btn) btn.disabled = true;
    await ensureGmailToken(true);
    const raw = buildRawMail({to,subject,body});
    const encoded = toBase64UrlUtf8(raw);
    const r = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send',{
      method:'POST',
      headers:{
        Authorization:`Bearer ${gmailAccessToken}`,
        'Content-Type':'application/json'
      },
      body:JSON.stringify({raw:encoded})
    });
    const d = await r.json();
    if(!r.ok || d.error){
      const msg = d?.error?.message || 'Gmail gönderimi başarısız oldu.';
      throw new Error(msg);
    }
    await markLeadContacted(lead);
    renderFirsatlarTable(CURRENT_LEADS, document.getElementById('fStats'), document.getElementById('fList'));
    if(okEl) okEl.textContent='✓ Mail gönderildi. Aday durumu “İletişimde” olarak güncellendi.';
    toast('Mail gönderildi');
  }catch(e){
    if(errEl) errEl.textContent = 'Gönderim hatası: '+(e?.message || e);
    console.error('Gmail gönderim hatası:', e);
  }finally{
    if(btn) btn.disabled = false;
  }
}
async function prospectLeads(){
  const msg = document.getElementById('pMsg');
  const fn = (CFG.fnBase||'').trim();
  if(!fn){ msg.textContent='Ayarlar > Functions base URL girilmedi, canlı arama çalıştırılamadı.'; return; }
  msg.textContent='Adaylar aranıyor...';
  try{
    const body={segment:val('pSeg'),city:val('pCity'),district:val('pDist')||null,max:+val('pMax')||20};
    const r = await fetch(fn+'/prospect',{method:'POST',body:JSON.stringify(body)});
    const d = await r.json();
    if(d.error) msg.textContent='Hata: '+d.error;
    else msg.textContent=`✓ ${d.found||0} aday bulundu, ${d.inserted||0} yeni kayıt eklendi.`;

  }catch(e){ msg.textContent='Bağlantı hatası: '+e.message; }
}

/* ---------- TAKVİM ---------- */
VIEWS.takvim = async () => {
  C().innerHTML=`
    <div class="card card-pad">
      <div class="sec-head" style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <h2>Ödeme Takvimi</h2>
          <p>Taslak → onay → takvime ekle → tahsil edildi akışı</p>
        </div>
        <button class="btn ghost sm" onclick="loadOdemeTakvimi()">↻ Yenile</button>
      </div>
      <div id="otSummary" class="hint" style="margin-bottom:10px"></div>
      <div id="otList"></div>
    </div>`;
  await loadOdemeTakvimi();
};
async function loadOdemeTakvimi(){
  const sumEl = document.getElementById('otSummary');
  const listEl = document.getElementById('otList');
  if(!sumEl || !listEl) return;
  if(!sb){
    sumEl.textContent='Supabase bağlantısı yok.';
    sumEl.style.color='var(--coral)';
    listEl.innerHTML=`<div class="mail-err">Ödeme takvimi yüklenemedi: ${escapeHtml(SB_INIT_ERROR||'Bilinmeyen bağlantı hatası')}</div>`;
    return;
  }
  sumEl.style.color='var(--ink-soft)';
  const { data, error } = await sb.from('odeme_takvimi').select('*').order('vade_tarihi',{ascending:true});
  if(error){ sumEl.textContent='Hata: '+error.message; sumEl.style.color='var(--coral)'; listEl.innerHTML=''; return; }
  const rows = data || [];
  const x = rows.filter(r=>r.durum==='taslak').length;
  const y = rows.filter(r=>r.gcal_event_id).length;
  const z = rows.filter(r=>r.durum==='tahsil_edildi').length;
  sumEl.textContent = `${x} onay bekliyor, ${y} takvimde, ${z} tahsil edildi`;
  if(!rows.length){ listEl.innerHTML='<div class="hint">Kayıt bulunamadı.</div>'; return; }
  const byMonth = {};
  rows.forEach(r=>{
    const d = new Date(r.vade_tarihi);
    const key = d.toLocaleDateString('tr-TR',{month:'long',year:'numeric'});
    (byMonth[key] ||= []).push(r);
  });
  listEl.innerHTML = Object.entries(byMonth).map(([ay,items])=>`
    <div style="margin-bottom:14px">
      <h3 style="font-size:14px;color:var(--ink-soft);margin-bottom:8px">${escapeHtml(ay)}</h3>
      <table class="tbl">
        <thead><tr><th>Kurum</th><th>Başlık</th><th>Vade</th><th>Tutar</th><th>Durum</th><th>İşlem</th></tr></thead>
        <tbody>${items.map(r=>odemeSatiri(r)).join('')}</tbody>
      </table>
    </div>`).join('');
}
function odemeSatiri(r){
  const taslak = r.durum==='taslak';
  const onayli = r.durum==='onaylandi';
  const style = taslak ? 'background:rgba(251,191,36,.12)' : '';
  const tarih = (r.vade_tarihi||'').slice(0,10);
  return `<tr style="${style}">
    <td>${escapeHtml(r.kurum||'-')}</td>
    <td>${escapeHtml(r.baslik||'-')}${String(r.baslik||'').includes('❓')?'<div class="hint">❓ vade girilmeli</div>':''}</td>
    <td>${taslak?`<input class="inp" id="otDate-${r.id}" type="date" value="${tarih}" style="max-width:150px">`:escapeHtml(tarih||'-')}</td>
    <td>${taslak?`<input class="inp" id="otAmt-${r.id}" type="number" step="0.01" value="${Number(r.tutar||0)}" style="max-width:130px">`:TL(r.tutar||0)}</td>
    <td><span class="tag ${r.durum==='tahsil_edildi'?'won':taslak?'wait':'new'}">${escapeHtml(r.durum||'-')}</span>${r.gcal_event_id?'<div class="hint">📅 Takvimde</div>':''}</td>
    <td style="white-space:nowrap">
      ${taslak?`<button class="btn sm" onclick="onaylaOdeme(${r.id})">Onayla</button>`:''}
      <button class="btn ghost sm" onclick="takvimeEkleOdeme(${r.id})" ${onayli?'':'disabled'}>📅 Takvime Ekle</button>
      <button class="btn ghost sm" onclick="tahsilOdeme(${r.id})">Tahsil edildi</button>
    </td>
  </tr>`;
}
async function onaylaOdeme(id){
  if(!sb) return;
  const tarih = document.getElementById(`otDate-${id}`)?.value || null;
  const tutar = Number(document.getElementById(`otAmt-${id}`)?.value || 0);
  const payload = { durum:'onaylandi', tutar:Number.isFinite(tutar)?tutar:null };
  if(tarih) payload.vade_tarihi = tarih;
  const { error } = await sb.from('odeme_takvimi').update(payload).eq('id',id);
  if(error){ alert('Onaylama hatası: '+error.message); return; }
  await loadOdemeTakvimi();
}
async function takvimeEkleOdeme(id){
  if(!sb) return;
  const { data:row, error:err } = await sb.from('odeme_takvimi').select('*').eq('id',id).single();
  if(err || !row){ alert('Kayıt okunamadı'); return; }
  if(row.durum!=='onaylandi'){ alert('Önce onayla.'); return; }
  const fn = (CFG.fnBase||'').trim();
  if(!fn){ alert('Ayarlar > Functions base URL girilmedi.'); return; }
  try{
    const r = await fetch(fn+'/gcal-create',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        title:row.baslik || `${row.kurum} ödeme`,
        details:row.aciklama || '',
        date:row.vade_tarihi
      })
    });
    const d = await r.json();
    if(d.error || !d.event_id) throw new Error(d.error || 'event_id dönmedi');
    const { error } = await sb.from('odeme_takvimi').update({gcal_event_id:d.event_id}).eq('id',id);
    if(error) throw new Error(error.message);
    if(d.html_link) window.open(d.html_link,'_blank');
    await loadOdemeTakvimi();
  }catch(e){ alert('Takvime ekleme hatası: '+e.message); }
}
async function tahsilOdeme(id){
  if(!sb) return;
  const { error } = await sb.from('odeme_takvimi').update({durum:'tahsil_edildi'}).eq('id',id);
  if(error){ alert('Güncelleme hatası: '+error.message); return; }
  await loadOdemeTakvimi();
}

/* ============================================================
   Utils
   ============================================================ */
function val(id){ return document.getElementById(id).value; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s){ return escapeHtml(s).replace(/\n/g,'&#10;'); }
function mdToHtml(t){
  return escapeHtml(t)
    .replace(/^### (.*)$/gm,'<h4>$1</h4>')
    .replace(/^## (.*)$/gm,'<h4>$1</h4>')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.*)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,m=>'<ul>'+m+'</ul>')
    .replace(/\n{2,}/g,'</p><p>')
    .replace(/\n/g,'<br>');
}
function copyOut(id){
  const el=document.getElementById(id);
  navigator.clipboard.writeText(el.textContent);
  const b=event?.target; if(b){const o=b.textContent;b.textContent='✓ Kopyalandı';setTimeout(()=>b.textContent=o,1500);}
}

function uploadGenius(el){
  const f=el.files[0]; if(!f) return;
  if(f.size>1.5*1024*1024){ alert('Görsel 1.5MB\'tan küçük olmalı (tarayıcıda saklanıyor).'); return; }

  r.onload=()=>{ CFG.geniusImg=r.result; saveCfg(); document.getElementById('gPrev').innerHTML=geniusAvatarInner(); VIEWS.ayar(); };
  r.readAsDataURL(f);
}
